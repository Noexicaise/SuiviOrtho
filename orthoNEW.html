<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suivi Maya 🦷</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366F1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #F8FAFC; overscroll-behavior: none; }
        .day-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .is-pressing { transform: scale(0.92); filter: brightness(0.9); }
        .is-long-pressing { transform: scale(1.1); background-color: #FFE4E6 !important; border-color: #FB7185 !important; }
        
        .completed-done { background-color: #22C55E !important; border-color: #16A34A !important; color: white !important; }
        .completed-double { background-color: #059669 !important; border-color: #047857 !important; color: white !important; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3); }
        .completed-missed { background-color: #F43F5E !important; border-color: #E11D48 !important; color: white !important; }
        
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); border-color: #fb923c; }
            70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); border-color: #f97316; }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); border-color: #fb923c; }
        }
        .needs-attention { animation: pulse-orange 2s infinite; border-width: 3px !important; }
        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s ease; }
    </style>
</head>
<body class="pb-10">

    <div id="loader">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p class="text-slate-500 font-bold text-sm">Chargement local...</p>
    </div>

    <header class="bg-white p-6 shadow-sm rounded-b-[40px] mb-6 flex justify-between items-center border-b border-slate-100">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight text-indigo-600">Suivi Maya ✨</h1>
            <div class="flex items-center gap-2">
                <div id="status-dot" class="h-2 w-2 rounded-full bg-emerald-500"></div>
                <p id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mode Hors-Ligne OK</p>
            </div>
        </div>
        <button onclick="alert('Pense à installer l\'app sur ton écran d\'accueil pour les notifications !')" class="bg-slate-100 p-3 rounded-2xl text-xl hover:bg-indigo-100 transition-colors">
            🔔
        </button>
    </header>

    <main class="max-w-md mx-auto px-6">
        <div class="bg-slate-900 rounded-[32px] p-6 text-white mb-8 shadow-2xl relative overflow-hidden">
            <div id="time-alert" class="hidden absolute top-0 right-0 bg-orange-500 text-[8px] font-black px-3 py-1 rounded-bl-lg uppercase tracking-tighter">C'est l'heure de 19h ! ⏳</div>
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-indigo-300 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Objectif Sourire</p>
                    <h2 class="text-5xl font-black italic" id="counter">0 / 30</h2>
                </div>
                <p id="message" class="text-indigo-400 font-bold text-sm leading-tight max-w-[120px] text-right">Chargement...</p>
            </div>
            <div class="w-full bg-slate-800 h-4 rounded-full overflow-hidden p-1">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-emerald-400 h-full rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-3" id="grid"></div>

        <div class="mt-8 space-y-3">
            <div class="flex justify-center gap-4 text-[9px] font-bold text-slate-400 uppercase tracking-widest">
                <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-emerald-500"></div>Fait</div>
                <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-emerald-700"></div>Double</div>
                <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-rose-500"></div>Oubli</div>
            </div>
            <p class="text-center text-[8px] text-slate-300 uppercase font-bold tracking-widest italic">Double clic = Mode "Double" / Appui long = Oubli</p>
        </div>

        <button onclick="confirmReset()" class="block mx-auto mt-12 text-slate-300 text-[10px] font-bold uppercase tracking-[0.2em]">Réinitialiser mon suivi</button>
    </main>

    <script>
        // --- LOGIQUE PWA ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // --- LOGIQUE APPLICATION ---
        const totalDays = 30;
        const startDate = new Date(2026, 1, 20); // 20 Février 2026
        let daysState = {};

        // Chargement initial depuis le stockage local
        function init() {
            const savedData = localStorage.getItem('maya_ortho_data');
            if (savedData) {
                daysState = JSON.parse(savedData);
            }
            
            render();
            checkTimeAndAlert();
            
            // Masquer le loader
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 300);

            setInterval(checkTimeAndAlert, 60000);
        }

        // Le reste des fonctions (render, handleUpdate, etc.) adaptées pour le LocalStorage
        function render() {
            const grid = document.getElementById('grid');
            let currentTotal = 0;
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const isAfter19h = now.getHours() >= 19;

            grid.innerHTML = '';
            for (let i = 0; i < totalDays; i++) {
                const date = new Date(startDate); 
                date.setDate(startDate.getDate() + i);
                const key = date.toISOString().split('T')[0];
                const state = daysState[key];
                
                if (state === 'done') currentTotal += 1;
                if (state === 'double') currentTotal += 2;

                const btn = document.createElement('button');
                btn.className = `day-btn h-20 rounded-[22px] border-2 flex flex-col items-center justify-center font-bold `;
                
                if (state === 'done') {
                    btn.classList.add('completed-done');
                    btn.innerHTML = '✅';
                } else if (state === 'double') {
                    btn.classList.add('completed-double');
                    btn.innerHTML = '<span class="text-[10px] leading-none mb-0.5">x2</span><span class="text-xl">✅</span>';
                } else if (state === 'missed') {
                    btn.classList.add('completed-missed');
                    btn.innerHTML = '❌';
                } else {
                    btn.classList.add('bg-white', 'border-slate-100', 'text-slate-400');
                    btn.innerHTML = `<span class="text-[9px] opacity-50 uppercase">${date.toLocaleDateString('fr-FR', {weekday:'short'})}</span><span class="text-xl">${date.getDate()}</span>`;
                    if (key === todayStr && isAfter19h) btn.classList.add('needs-attention');
                }

                // Gestion des événements tactile (simplifié pour démo)
                setupEvents(btn, key);

                grid.appendChild(btn);
            }
            
            document.getElementById('counter').innerText = `${currentTotal} / ${totalDays}`;
            document.getElementById('progress-bar').style.width = `${Math.min((currentTotal/totalDays)*100, 100)}%`;
            document.getElementById('message').innerText = currentTotal >= totalDays ? "Gagné Maya ! 🎉" : (isAfter19h && !daysState[todayStr] ? "Vite Maya ! 🦷" : "Bravo Maya ! ✨");
        }

        let lastTapTime = 0;
        let tapTimeout, pressTimer;

        function setupEvents(btn, key) {
            btn.onpointerdown = (e) => {
                const nowTap = Date.now();
                btn.classList.add('is-pressing');
                
                // Détection Long Press
                pressTimer = setTimeout(() => {
                    if (window.navigator.vibrate) window.navigator.vibrate(50);
                    handleUpdate(key, 'missed');
                    lastTapTime = 0;
                }, 700);

                // Détection Double Tap
                if (nowTap - lastTapTime < 300) {
                    clearTimeout(tapTimeout);
                    clearTimeout(pressTimer);
                    handleUpdate(key, 'double');
                    lastTapTime = 0;
                } else {
                    lastTapTime = nowTap;
                }
            };

            btn.onpointerup = () => {
                clearTimeout(pressTimer);
                btn.classList.remove('is-pressing');
                if (lastTapTime !== 0) {
                    tapTimeout = setTimeout(() => {
                        handleUpdate(key, 'done');
                        lastTapTime = 0;
                    }, 250);
                }
            };
        }

        function handleUpdate(key, type) {
            if (daysState[key] === type) {
                delete daysState[key];
            } else {
                daysState[key] = type;
            }
            
            // Vibration haptique
            if (window.navigator.vibrate) window.navigator.vibrate(10);
            
            // Sauvegarde locale
            localStorage.setItem('maya_ortho_data', JSON.stringify(daysState));
            render();

            const score = Object.values(daysState).reduce((acc, val) => {
                if(val === 'done') return acc + 1;
                if(val === 'double') return acc + 2;
                return acc;
            }, 0);

            if (score >= totalDays) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function checkTimeAndAlert() {
            const now = new Date();
            const todayKey = now.toISOString().split('T')[0];
            const timeAlert = document.getElementById('time-alert');
            if (now.getHours() >= 19 && !daysState[todayKey]) {
                timeAlert.classList.remove('hidden');
            } else {
                timeAlert.classList.add('hidden');
            }
        }

        window.confirmReset = () => { if(confirm("Effacer ton suivi personnel ?")) { localStorage.removeItem('maya_ortho_data'); location.reload(); } };
        
        init();
    </script>
</body>
</html>
